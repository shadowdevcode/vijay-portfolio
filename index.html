  <style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    html {
      scroll-behavior: smooth;
    }

    /* Scroll-triggered fade-in-up animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    /* Stagger children for sequential reveals */
    .stagger-1 {
      animation-delay: 0.1s;
    }

    .stagger-2 {
      animation-delay: 0.2s;
    }

    .stagger-3 {
      animation-delay: 0.3s;
    }

    .stagger-4 {
      animation-delay: 0.4s;
    }

    /* Subtle pulse for chat button */
    @keyframes gentlePulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(24, 24, 27, 0.4);
      }

      50% {
        box-shadow: 0 0 0 12px rgba(24, 24, 27, 0);
      }
    }

    .animate-gentle-pulse {
      animation: gentlePulse 2.5s ease-in-out 3;
    }

    /* Print: hide floating UI */
    @media print {
      .fixed {
        display: none !important;
      }

      body {
        background: white !important;
      }
    }

    /* Text overflow protection */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
